name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Check formatting
        run: pnpm --filter @touch-traversal/web format:check

      - name: Build web application
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm --filter @touch-traversal/web exec playwright install --with-deps chromium

      - name: Browser smoke tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  pipeline:
    name: Pipeline quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: pipeline
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.29"
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: pipeline/uv.lock

      - name: Install dependencies
        run: uv sync --all-groups --locked

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy touch_traversal tests

      - name: Tests
        run: uv run pytest

      - name: Build package
        run: uv build
