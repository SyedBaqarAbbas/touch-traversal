name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Build static export
        run: pnpm --filter @touch-traversal/web build
        env:
          NEXT_PUBLIC_BASE_PATH: /touch-traversal

      - name: Prepare public release files
        run: |
          cp LICENSE apps/web/out/LICENSE
          cp THIRD_PARTY_NOTICES.md apps/web/out/THIRD_PARTY_NOTICES.md
          cp -R THIRD_PARTY_LICENSES apps/web/out/THIRD_PARTY_LICENSES
          rm apps/web/out/AGENTS.md

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/web/out

  deploy:
    name: Deploy static site
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
